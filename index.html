<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0500">
    <meta name="description" content="Controlador Sonoro Inteligente para Quadrilha Junina - Sesc 2026">
    <title>Quadrilha do Sesc 2026</title>
    <style>
        :root {
            --bg-deep: #0a0300;
            --bg-card: #1a0c02;
            --gold: #f0c060;
            --gold-light: #ffe0a0;
            --orange-glow: #ff7b20;
            --orange-warm: #ff9500;
            --yellow-warm: #ffc107;
            --red-glow: #ff2a2a;
            --text-primary: #fff6ed;
            --text-secondary: #d4b896;
            --shadow-glow: 0 0 40px rgba(255, 140, 30, 0.5);
            --shadow-glow-strong: 0 0 60px rgba(255, 150, 40, 0.7);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 10px;
            --font-display: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --disc-size-mobile: 130px;
            --disc-size-tablet: 150px;
            --disc-size-desktop: 170px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg-deep);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 20%, rgba(255, 120, 20, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(255, 90, 10, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 65%, rgba(255, 160, 40, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(200, 70, 10, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #0d0400 0%, #150800 30%, #0a0200 60%, #060100 100%);
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 60px,
                    rgba(255, 150, 40, 0.015) 60px,
                    rgba(255, 150, 40, 0.015) 61px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 60px,
                    rgba(255, 150, 40, 0.015) 60px,
                    rgba(255, 150, 40, 0.015) 61px);
        }

        .sparks-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--orange-warm);
            border-radius: 50%;
            animation: sparkFloat 3.5s ease-in infinite;
            opacity: 0;
            box-shadow: 0 0 6px 2px rgba(255, 160, 30, 0.7);
        }

        .spark:nth-child(odd) {
            background: var(--yellow-warm);
            box-shadow: 0 0 8px 3px rgba(255, 200, 60, 0.8);
            animation-duration: 4.2s;
            animation-delay: 0.5s;
        }
        .spark:nth-child(3n) {
            animation-duration: 3.0s;
            animation-delay: 1.2s;
            width: 2px;
            height: 2px;
        }
        .spark:nth-child(4n) {
            animation-duration: 4.8s;
            animation-delay: 0.3s;
        }
        .spark:nth-child(5n) {
            animation-duration: 3.7s;
            animation-delay: 1.8s;
            width: 4px;
            height: 4px;
        }

        @keyframes sparkFloat {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            30% {
                opacity: 0.7;
                transform: translateY(-120px) translateX(15px) scale(1.3);
            }
            60% {
                opacity: 0.3;
                transform: translateY(-260px) translateX(-10px) scale(0.7);
            }
            100% {
                opacity: 0;
                transform: translateY(-420px) translateX(20px) scale(0.1);
            }
        }

        .bandeirinhas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 6px 10px;
            flex-wrap: wrap;
        }

        .bandeirinha {
            width: 18px;
            height: 24px;
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            animation: bandeiraSwing 2.5s ease-in-out infinite;
            transform-origin: top center;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.4));
        }
        .bandeirinha:nth-child(odd) {
            animation-delay: 0.15s;
        }
        .bandeirinha:nth-child(3n) {
            animation-delay: -0.3s;
            animation-duration: 2.8s;
        }
        .bandeirinha:nth-child(4n) {
            animation-delay: -0.6s;
            animation-duration: 2.2s;
        }

        @keyframes bandeiraSwing {
            0%,
            100% {
                transform: rotate(-3deg) scaleY(1);
            }
            25% {
                transform: rotate(4deg) scaleY(1.05);
            }
            50% {
                transform: rotate(-2deg) scaleY(0.97);
            }
            75% {
                transform: rotate(5deg) scaleY(1.03);
            }
        }

        .bandeirinha.c1 {
            background: #e74c3c;
        }
        .bandeirinha.c2 {
            background: #f39c12;
        }
        .bandeirinha.c3 {
            background: #2ecc71;
        }
        .bandeirinha.c4 {
            background: #3498db;
        }
        .bandeirinha.c5 {
            background: #f1c40f;
        }
        .bandeirinha.c6 {
            background: #9b59b6;
        }
        .bandeirinha.c7 {
            background: #e91e63;
        }
        .bandeirinha.c8 {
            background: #ff9800;
        }
        .bandeirinha.c9 {
            background: #4caf50;
        }
        .bandeirinha.c10 {
            background: #2196f3;
        }

        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .splash-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: all;
        }

        .splash-screen.hidden {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
        }

        .splash-logo-area {
            position: relative;
            margin-bottom: 20px;
        }

        .splash-icon-glow {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 160, 40, 0.7) 0%, rgba(255, 100, 20, 0.3) 40%, transparent 70%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 2s ease-in-out infinite;
            filter: blur(25px);
        }

        @keyframes glowPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.6);
                opacity: 1;
            }
        }

        .splash-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffe8c0 0%, #f0a040 40%, #b85010 80%, #5a2000 100%);
            position: relative;
            z-index: 2;
            box-shadow:
                0 0 50px rgba(255, 150, 40, 0.6),
                0 0 100px rgba(255, 120, 30, 0.3),
                0 8px 25px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .splash-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: bold;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(255, 160, 50, 0.6), 0 2px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
            line-height: 1.2;
            position: relative;
            z-index: 2;
        }

        .splash-subtitle {
            font-family: var(--font-body);
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            position: relative;
            z-index: 2;
            font-weight: 300;
        }

        .btn-play-main {
            position: relative;
            z-index: 2;
            padding: 16px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #e05010 0%, #ff8c30 50%, #e05010 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow:
                0 0 35px rgba(255, 130, 40, 0.5),
                0 6px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: all var(--transition-fast);
            font-family: var(--font-body);
            animation: btnPulse 2.5s ease-in-out infinite;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-play-main:hover {
            box-shadow:
                0 0 60px rgba(255, 150, 50, 0.7),
                0 8px 25px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }
        .btn-play-main:active {
            transform: scale(0.95);
            box-shadow:
                0 0 25px rgba(255, 120, 30, 0.4),
                0 3px 10px rgba(0, 0, 0, 0.4),
                inset 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
        }

        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 0 35px rgba(255, 130, 40, 0.5), 0 6px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            }
            50% {
                box-shadow: 0 0 55px rgba(255, 160, 50, 0.75), 0 6px 22px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
        }

        .main-screen {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px 20px;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            opacity: 0;
            transform: translateY(30px);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .main-screen.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .main-header {
            text-align: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .main-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            color: var(--text-primary);
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 150, 40, 0.5);
            margin: 0;
            line-height: 1.3;
        }

        .main-header .subtitle-sm {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .discs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 8px 4px;
            flex-shrink: 0;
            max-width: 500px;
            width: 100%;
            justify-items: center;
        }

        @media (min-width: 500px) {
            .discs-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                max-width: 600px;
            }
        }

        @media (min-width: 768px) {
            .discs-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 25px;
                max-width: 700px;
            }
        }

        .disc-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            position: relative;
            transition: transform var(--transition-fast);
        }
        .disc-wrapper:active {
            transform: scale(0.94);
        }

        .disc-label {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
            transition: color var(--transition-fast);
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        }

        .disc-wrapper.active .disc-label {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 180, 60, 0.8);
        }

        .disc-cd {
            width: var(--disc-size-mobile);
            height: var(--disc-size-mobile);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all var(--transition-smooth);
            box-shadow:
                0 8px 25px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.06),
                inset 0 0 0 2px rgba(255, 255, 255, 0.04);
            background: radial-gradient(circle at 40% 35%,
                    rgba(255, 255, 255, 0.15) 0%,
                    transparent 25%),
                radial-gradient(circle at 50% 50%,
                    var(--disc-color) 0%,
                    var(--disc-color-dark) 50%,
                    #1a1a1a 55%,
                    #2a2a2a 58%,
                    #3a3a3a 60%,
                    #555 62%,
                    #888 65%,
                    #aaa 68%,
                    #999 72%,
                    #666 76%,
                    #444 80%,
                    #333 85%,
                    #222 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }

        .disc-cd::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            pointer-events: none;
            z-index: 5;
        }

        .disc-cd::after {
            content: '';
            position: absolute;
            top: 8%;
            left: 15%;
            width: 45%;
            height: 25%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            pointer-events: none;
            z-index: 4;
            filter: blur(6px);
            transform: rotate(-15deg);
        }

        .disc-center {
            width: 22%;
            height: 22%;
            border-radius: 50%;
            background: radial-gradient(circle, #111 0%, #000 70%, #333 100%);
            position: relative;
            z-index: 6;
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 0 6px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            transition: all var(--transition-fast);
        }

        .disc-wrapper.active .disc-center {
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                0 0 15px var(--disc-glow),
                0 0 30px var(--disc-glow);
            color: rgba(255, 255, 255, 0.9);
        }

        .disc-glow-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            box-shadow:
                0 0 35px var(--disc-glow),
                0 0 70px var(--disc-glow),
                0 0 100px rgba(255, 150, 40, 0.3);
        }
        .disc-wrapper.active .disc-glow-ring {
            opacity: 1;
            animation: glowRingPulse 1.5s ease-in-out infinite;
        }

        @keyframes glowRingPulse {
            0%,
            100% {
                box-shadow: 0 0 35px var(--disc-glow), 0 0 70px var(--disc-glow), 0 0 100px rgba(255, 150, 40, 0.3);
            }
            50% {
                box-shadow: 0 0 55px var(--disc-glow), 0 0 100px var(--disc-glow), 0 0 140px rgba(255, 180, 50, 0.5);
            }
        }

        .disc-cd.spinning {
            animation: discSpin 2.5s linear infinite;
        }

        @keyframes discSpin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .control-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 12px 20px;
            margin-top: 10px;
            flex-shrink: 0;
            background: rgba(20, 10, 4, 0.8);
            border-radius: 50px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 20;
        }

        .btn-play-pause {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #ff7b20 0%, #e05510 100%);
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255, 130, 40, 0.5), 0 4px 12px rgba(0, 0, 0, 0.4);
            transition: all var(--transition-fast);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .btn-play-pause:active {
            transform: scale(0.9);
            box-shadow: 0 0 15px rgba(255, 120, 30, 0.3), 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .btn-play-pause.paused {
            background: linear-gradient(135deg, #555 0%, #333 100%);
            box-shadow: 0 0 15px rgba(150, 150, 150, 0.3), 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .btn-play-pause svg {
            width: 24px;
            height: 24px;
            pointer-events: none;
            fill: currentColor;
        }

        /* Botão TIRO - Estilo cinematográfico */
        .btn-tiro {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #ff4444, #8b0000);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6), 0 4px 12px rgba(0, 0, 0, 0.5);
            transition: all var(--transition-fast);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            font-family: var(--font-display);
        }

        .btn-tiro:active {
            transform: scale(0.85);
            box-shadow: 0 0 40px rgba(255, 50, 0, 0.9), 0 2px 8px rgba(0,0,0,0.6);
            transition: all 0.05s ease;
        }

        .btn-tiro.impact {
            animation: tiroImpact 0.2s ease-out;
        }

        @keyframes tiroImpact {
            0% {
                transform: scale(1);
                background: radial-gradient(circle at 30% 30%, #ff7777, #aa0000);
                box-shadow: 0 0 60px rgba(255, 80, 0, 1);
            }
            100% {
                transform: scale(0.95);
                background: radial-gradient(circle at 30% 30%, #ff4444, #8b0000);
                box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
            }
        }

        .status-indicator {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-align: center;
            flex-shrink: 0;
        }
        .status-indicator .current-cat {
            color: #fff;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 180, 60, 0.6);
        }

        .sequence-dots {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .sequence-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all var(--transition-fast);
        }
        .sequence-dot.done {
            background: rgba(255, 180, 60, 0.6);
            box-shadow: 0 0 8px rgba(255, 180, 60, 0.4);
        }
        .sequence-dot.current {
            background: #ff9d30;
            box-shadow: 0 0 14px rgba(255, 160, 40, 0.8);
            animation: dotPulse 1s ease-in-out infinite;
            width: 10px;
            height: 10px;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 14px rgba(255, 160, 40, 0.8);
            }
            50% {
                box-shadow: 0 0 22px rgba(255, 200, 60, 1);
            }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 15, 5, 0.95);
            color: #fff;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        @media (min-width: 500px) {
            .disc-cd {
                width: var(--disc-size-tablet);
                height: var(--disc-size-tablet);
            }
            .disc-label {
                font-size: 0.75rem;
            }
        }

        @media (min-width: 768px) {
            .disc-cd {
                width: var(--disc-size-desktop);
                height: var(--disc-size-desktop);
            }
            .disc-label {
                font-size: 0.8rem;
            }
            .main-header h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-height: 640px) {
            .discs-grid {
                gap: 10px;
            }
            .disc-cd {
                width: 105px;
                height: 105px;
            }
            .disc-label {
                font-size: 0.65rem;
            }
            .control-bar {
                padding: 8px 16px;
                margin-top: 5px;
            }
            .btn-play-pause, .btn-tiro {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .main-header h1 {
                font-size: 1rem;
            }
            .main-header {
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="sparks-container" id="sparksContainer"></div>
    <div class="bandeirinhas" id="bandeirinhasContainer"></div>
    <div class="toast" id="toast"></div>

    <div class="app-container" id="appContainer">
        <div class="splash-screen" id="splashScreen">
            <div class="splash-logo-area">
                <div class="splash-icon-glow"></div>
                <div class="splash-icon">🎭</div>
            </div>
            <h1 class="splash-title">Quadrilha do Sesc 2026</h1>
            <p class="splash-subtitle">Roteiro Sonoro da Quadrilha</p>
            <button class="btn-play-main" id="btnOpenMain" aria-label="Tocar o Som">▶&ensp;TOCAR O SOM</button>
        </div>

        <div class="main-screen" id="mainScreen">
            <div class="main-header">
                <h1>Quadrilha do Sesc 2026</h1>
                <p class="subtitle-sm">Roteiro Sonoro</p>
            </div>
            <div class="sequence-dots" id="sequenceDots"></div>
            <div class="discs-grid" id="discsGrid"></div>
            <div class="status-indicator" id="statusIndicator">
                Toque em um disco para <span class="current-cat">iniciar</span>
            </div>
            <div class="control-bar">
                <button class="btn-play-pause paused" id="btnPlayPause" aria-label="Play / Pause">
                    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
                    <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><rect x="5" y="3" width="5" height="18" rx="1"/><rect x="14" y="3" width="5" height="18" rx="1"/></svg>
                </button>
                <button class="btn-tiro" id="btnTiro" aria-label="TIRO">💥</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ CONFIGURAÇÃO DAS CATEGORIAS E LINKS DIRETOS ============
            const CATEGORIES = [
                { id: 'entrada', label: 'ENTRADA', color: '#4a90d9', colorDark: '#1e3a5f', glow: 'rgba(74,144,217,0.7)', order: 0, url: 'https://files.catbox.moe/jga4ul.mpeg' },
                { id: 'preparacao', label: 'PREPARAÇÃO', color: '#4caf50', colorDark: '#1b5e20', glow: 'rgba(76,175,80,0.7)', order: 1, url: 'https://files.catbox.moe/rcaexj.mp3' },
                { id: 'explode_coracao', label: 'EXPLODE CORAÇÃO', color: '#f44336', colorDark: '#7f0000', glow: 'rgba(244,67,54,0.7)', order: 2, url: 'https://files.catbox.moe/oxbyqm.mp3' },
                { id: 'quadrilhao', label: 'QUADRILHÃO', color: '#ff9800', colorDark: '#6d3500', glow: 'rgba(255,152,0,0.7)', order: 3, url: 'https://files.catbox.moe/ld6txt.mpeg' },
                { id: 'chute_menina', label: 'XOTE DA MENINA', color: '#e91e63', colorDark: '#6d0030', glow: 'rgba(233,30,99,0.7)', order: 4, url: 'https://files.catbox.moe/yjmdjo.mpeg' },
                { id: 'despedida', label: 'DESPEDIDA', color: '#9c27b0', colorDark: '#3d0050', glow: 'rgba(156,39,176,0.7)', order: 5, url: 'https://files.catbox.moe/ld6txt.mpeg' }
            ];

            // ============ ESTADO DO APP ============
            const state = {
                currentCategoryId: null,
                isPlaying: false,
                audioElement: null,
                sequenceCompleted: {},
                isTransitioning: false,
                savedPauseTime: 0
            };

            // ============ ELEMENTOS DO DOM ============
            const splashScreen = document.getElementById('splashScreen');
            const mainScreen = document.getElementById('mainScreen');
            const btnOpenMain = document.getElementById('btnOpenMain');
            const btnPlayPause = document.getElementById('btnPlayPause');
            const iconPlay = document.getElementById('iconPlay');
            const iconPause = document.getElementById('iconPause');
            const discsGrid = document.getElementById('discsGrid');
            const sequenceDots = document.getElementById('sequenceDots');
            const statusIndicator = document.getElementById('statusIndicator');
            const toast = document.getElementById('toast');
            const sparksContainer = document.getElementById('sparksContainer');
            const bandeirinhasContainer = document.getElementById('bandeirinhasContainer');
            const btnTiro = document.getElementById('btnTiro');

            // ============ CRIA ELEMENTOS DECORATIVOS ============
            function createSparks() {
                const count = 28;
                let html = '';
                for (let i = 0; i < count; i++) {
                    const left = Math.random() * 94 + 3;
                    const delay = Math.random() * 5;
                    const size = Math.random() * 3 + 1.5;
                    html += `<div class="spark" style="left:${left}%;bottom:${Math.random()*20}%;width:${size}px;height:${size}px;animation-delay:${delay}s;"></div>`;
                }
                sparksContainer.innerHTML = html;
            }

            function createBandeirinhas() {
                const cores = ['c1', 'c2', 'c3', 'c4', 'c5', 'c6', 'c7', 'c8', 'c9', 'c10'];
                const count = 22;
                let html = '';
                for (let i = 0; i < count; i++) {
                    const cor = cores[i % cores.length];
                    html += `<div class="bandeirinha ${cor}"></div>`;
                }
                bandeirinhasContainer.innerHTML = html;
            }

            // ============ TOAST ============
            let toastTimeout;
            function showToast(message, duration = 2000) {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ============ ÁUDIO ============
            function createAudioElement() {
                if (state.audioElement) {
                    state.audioElement.pause();
                    state.audioElement.removeAttribute('src');
                    state.audioElement.load();
                } else {
                    state.audioElement = new Audio();
                    state.audioElement.preload = 'auto';
                    state.audioElement.addEventListener('ended', onAudioEnded);
                    state.audioElement.addEventListener('error', onAudioError);
                }
                return state.audioElement;
            }

            function onAudioEnded() {
                if (state.audioElement) state.audioElement.volume = 1.0;
                state.isPlaying = false;
                updatePlayPauseButton();
                const currentCat = CATEGORIES.find(c => c.id === state.currentCategoryId);
                if (currentCat) {
                    state.sequenceCompleted[currentCat.id] = true;
                    updateSequenceDots();
                    updateDiscStates();
                    const nextCat = getNextCategory(currentCat.order);
                    if (nextCat) {
                        showToast(`▶ Próxima: ${nextCat.label}`, 1800);
                        setTimeout(() => {
                            playCategory(nextCat.id);
                        }, 400);
                    } else {
                        showToast('🏁 Fim do roteiro!', 2500);
                        state.currentCategoryId = null;
                        state.isPlaying = false;
                        updateAllUI();
                    }
                }
            }

            function onAudioError(e) {
                console.error('Erro no áudio:', e);
                state.isPlaying = false;
                updateAllUI();
                showToast('⚠ Erro ao reproduzir áudio', 2500);
            }

            function getNextCategory(currentOrder) {
                const nextOrder = currentOrder + 1;
                return CATEGORIES.find(c => c.order === nextOrder) || null;
            }

            // Efeitos de transição (fade)
            function fadeOutAudio(audioElement, durationMs = 180) {
                return new Promise(resolve => {
                    if (!audioElement || audioElement.readyState === 0 || audioElement.paused) { resolve(); return; }
                    const steps = 10;
                    const startVolume = audioElement.volume;
                    const volumeStep = startVolume / steps;
                    const interval = durationMs / steps;
                    let step = 0;
                    const fadeInterval = setInterval(() => {
                        step++;
                        audioElement.volume = Math.max(0, startVolume - volumeStep * step);
                        if (step >= steps) {
                            clearInterval(fadeInterval);
                            audioElement.volume = 0;
                            audioElement.pause();
                            resolve();
                        }
                    }, interval);
                });
            }

            function fadeInAudio(audioElement, targetVolume = 1.0, durationMs = 180) {
                return new Promise(resolve => {
                    if (!audioElement || audioElement.readyState === 0) { resolve(); return; }
                    audioElement.volume = 0;
                    const steps = 10;
                    const volumeStep = targetVolume / steps;
                    const interval = durationMs / steps;
                    let step = 0;
                    const fadeInterval = setInterval(() => {
                        step++;
                        audioElement.volume = Math.min(targetVolume, volumeStep * step);
                        if (step >= steps) {
                            clearInterval(fadeInterval);
                            audioElement.volume = targetVolume;
                            resolve();
                        }
                    }, interval);
                });
            }

            function playTransitionEffect() {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const duration = 0.09;
                    const now = ctx.currentTime;
                    const bufferSize = Math.floor(ctx.sampleRate * duration);
                    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2;
                    const noiseSource = ctx.createBufferSource();
                    noiseSource.buffer = noiseBuffer;
                    const bandpass = ctx.createBiquadFilter();
                    bandpass.type = 'bandpass';
                    bandpass.frequency.value = 2000;
                    bandpass.Q.value = 0.6;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.2, now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    noiseSource.connect(bandpass);
                    bandpass.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noiseSource.start(now);
                    noiseSource.stop(now + duration);
                    noiseSource.onended = () => { noiseSource.disconnect(); bandpass.disconnect(); gainNode.disconnect(); ctx.close(); };
                } catch(e) { console.warn('Transição não suportada'); }
            }

            // ============ REPRODUÇÃO COM TRANSIÇÃO SUAVE ============
            async function playCategory(categoryId) {
                if (state.isTransitioning) return;
                const targetCategory = CATEGORIES.find(c => c.id === categoryId);
                if (!targetCategory) return;
                state.isTransitioning = true;
                const audio = createAudioElement();
                const isDifferentTrack = (state.currentCategoryId !== categoryId);

                if (!isDifferentTrack && audio.src && !audio.ended && audio.paused) {
                    await audio.play();
                    await fadeInAudio(audio, 1.0, 120);
                    state.isPlaying = true;
                    state.currentCategoryId = categoryId;
                    updateAllUI();
                    state.isTransitioning = false;
                    return;
                }

                if (isDifferentTrack && audio.src && !audio.ended && !audio.paused) {
                    await fadeOutAudio(audio, 130);
                    audio.pause();
                    audio.removeAttribute('src');
                    audio.load();
                    playTransitionEffect();
                    await new Promise(r => setTimeout(r, 70));
                } else if (audio.src) {
                    audio.pause();
                    audio.removeAttribute('src');
                    audio.load();
                    playTransitionEffect();
                    await new Promise(r => setTimeout(r, 60));
                } else {
                    playTransitionEffect();
                    await new Promise(r => setTimeout(r, 40));
                }

                audio.src = targetCategory.url;
                audio.load();
                audio.currentTime = 0;
                const onCanPlay = async () => {
                    audio.removeEventListener('canplay', onCanPlay);
                    try {
                        await audio.play();
                        await fadeInAudio(audio, 1.0, 200);
                        state.isPlaying = true;
                        state.currentCategoryId = categoryId;
                        if (!state.sequenceCompleted[categoryId]) state.sequenceCompleted[categoryId] = true;
                        updateAllUI();
                        state.isTransitioning = false;
                        showToast(`🎵 Tocando: ${targetCategory.label}`, 1200);
                    } catch(err) {
                        console.error('Erro ao tocar:', err);
                        state.isPlaying = false;
                        updateAllUI();
                        state.isTransitioning = false;
                        showToast('⚠ Toque para iniciar', 2000);
                    }
                };
                audio.addEventListener('canplay', onCanPlay, { once: true });
                setTimeout(() => { if (audio.readyState >= 2 && !audio.paused) onCanPlay(); }, 250);
            }

            // Botão Play/Pause corrigido
            function togglePlayPause() {
                const audio = state.audioElement;
                if (!audio || !audio.src) {
                    const first = CATEGORIES[0];
                    if (first) playCategory(first.id);
                    return;
                }
                if (audio.paused) {
                    audio.play().then(() => {
                        state.isPlaying = true;
                        updateAllUI();
                    }).catch(err => { console.error(err); showToast('⚠ Falha ao reproduzir', 2000); });
                } else {
                    audio.pause();
                    state.isPlaying = false;
                    updateAllUI();
                }
            }

            // ============ BOTÃO TIRO ============
            async function dispararTiro() {
                // Efeito visual de impacto no botão
                btnTiro.classList.add('impact');
                setTimeout(() => btnTiro.classList.remove('impact'), 200);

                // Pausar a música atual e salvar o tempo
                const audio = state.audioElement;
                let currentTimeSaved = 0;
                if (audio && !audio.paused) {
                    currentTimeSaved = audio.currentTime;
                    await fadeOutAudio(audio, 50);
                    audio.pause();
                    audio.currentTime = currentTimeSaved;
                    state.savedPauseTime = currentTimeSaved;
                    state.isPlaying = false;
                    updatePlayPauseButton();
                    updateDiscStates();
                } else if (audio && audio.paused && audio.src) {
                    state.savedPauseTime = audio.currentTime;
                }

                // Criar efeito sonoro de tiro MUITO FORTE (Web Audio)
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const now = ctx.currentTime;
                    const gainMaster = ctx.createGain();
                    gainMaster.gain.value = 1.2;
                    gainMaster.connect(ctx.destination);

                    // Ruído de explosão
                    const duration = 1.0;
                    const bufferSize = ctx.sampleRate * duration;
                    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.95;

                    const noise = ctx.createBufferSource();
                    noise.buffer = noiseBuffer;
                    const lowpass = ctx.createBiquadFilter();
                    lowpass.type = 'lowpass';
                    lowpass.frequency.value = 2500;
                    lowpass.Q.value = 1.2;
                    const gainNoise = ctx.createGain();
                    gainNoise.gain.setValueAtTime(0.9, now);
                    gainNoise.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

                    noise.connect(lowpass);
                    lowpass.connect(gainNoise);
                    gainNoise.connect(gainMaster);
                    noise.start();
                    noise.stop(now + 0.6);

                    // Tonalidade de impacto grave
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 80;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.setValueAtTime(0.8, now);
                    gainOsc.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.connect(gainOsc);
                    gainOsc.connect(gainMaster);
                    osc.start();
                    osc.stop(now + 0.4);

                    // Segundo harmônico para impacto metálico
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'triangle';
                    osc2.frequency.value = 320;
                    const gainOsc2 = ctx.createGain();
                    gainOsc2.gain.setValueAtTime(0.5, now);
                    gainOsc2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc2.connect(gainOsc2);
                    gainOsc2.connect(gainMaster);
                    osc2.start();
                    osc2.stop(now + 0.3);

                    // Fechar contexto após som
                    setTimeout(() => ctx.close(), 800);
                } catch(e) { console.warn("Áudio Web Audio não suportado"); }

                showToast("💥 TIRO! Música pausada", 1500);
                // Não resetar a música, apenas pausar e manter tempo
                updateAllUI();
            }

            // ============ UI ============
            function updateAllUI() {
                updatePlayPauseButton();
                updateDiscStates();
                updateSequenceDots();
                updateStatusIndicator();
            }

            function updatePlayPauseButton() {
                if (state.isPlaying) {
                    btnPlayPause.classList.remove('paused');
                    iconPlay.style.display = 'none';
                    iconPause.style.display = 'block';
                } else {
                    btnPlayPause.classList.add('paused');
                    iconPlay.style.display = 'block';
                    iconPause.style.display = 'none';
                }
            }

            function updateDiscStates() {
                document.querySelectorAll('.disc-wrapper').forEach(wrapper => {
                    const catId = wrapper.dataset.categoryId;
                    const cd = wrapper.querySelector('.disc-cd');
                    if (catId === state.currentCategoryId && state.isPlaying) {
                        wrapper.classList.add('active');
                        cd.classList.add('spinning');
                    } else if (catId === state.currentCategoryId && !state.isPlaying) {
                        wrapper.classList.add('active');
                        cd.classList.remove('spinning');
                    } else {
                        wrapper.classList.remove('active');
                        cd.classList.remove('spinning');
                    }
                });
            }

            function updateSequenceDots() {
                document.querySelectorAll('.sequence-dot').forEach(dot => {
                    const catId = dot.dataset.categoryId;
                    dot.classList.remove('done', 'current');
                    if (catId === state.currentCategoryId && state.isPlaying) dot.classList.add('current');
                    else if (state.sequenceCompleted[catId]) dot.classList.add('done');
                });
            }

            function updateStatusIndicator() {
                const span = statusIndicator.querySelector('.current-cat');
                if (state.isPlaying && state.currentCategoryId) {
                    const cat = CATEGORIES.find(c => c.id === state.currentCategoryId);
                    span.textContent = cat ? cat.label : 'tocando';
                    statusIndicator.innerHTML = `🎵 Tocando agora: <span class="current-cat">${span.textContent}</span>`;
                } else if (state.currentCategoryId && !state.isPlaying) {
                    const cat = CATEGORIES.find(c => c.id === state.currentCategoryId);
                    span.textContent = cat ? cat.label : '';
                    statusIndicator.innerHTML = `⏸ Pausado em: <span class="current-cat">${span.textContent}</span>`;
                } else {
                    span.textContent = 'iniciar';
                    statusIndicator.innerHTML = 'Toque em um disco para <span class="current-cat">iniciar</span>';
                }
            }

            // ============ INTERFACE DE DISCOS ============
            function buildDiscsGrid() {
                let html = '';
                CATEGORIES.forEach(cat => {
                    html += `
                    <div class="disc-wrapper" data-category-id="${cat.id}" data-order="${cat.order}">
                        <div class="disc-glow-ring" style="--disc-glow:${cat.glow};"></div>
                        <div class="disc-cd" style="--disc-color:${cat.color};--disc-color-dark:${cat.colorDark};--disc-glow:${cat.glow};" title="Clique para tocar: ${cat.label}">
                            <div class="disc-center">●</div>
                        </div>
                        <span class="disc-label">${cat.label}</span>
                    </div>`;
                });
                discsGrid.innerHTML = html;

                discsGrid.querySelectorAll('.disc-cd').forEach(cd => {
                    cd.addEventListener('click', (e) => {
                        const wrapper = cd.closest('.disc-wrapper');
                        const catId = wrapper.dataset.categoryId;
                        playCategory(catId);
                    });
                });
            }

            function buildSequenceDots() {
                let html = '';
                CATEGORIES.forEach(cat => {
                    html += `<div class="sequence-dot" data-category-id="${cat.id}" title="${cat.label}"></div>`;
                });
                sequenceDots.innerHTML = html;
            }

            // ============ INICIALIZAÇÃO ============
            async function initApp() {
                createSparks();
                createBandeirinhas();
                buildDiscsGrid();
                buildSequenceDots();
                updatePlayPauseButton();
                updateStatusIndicator();

                btnOpenMain.addEventListener('click', () => {
                    splashScreen.classList.add('hidden');
                    mainScreen.classList.add('active');
                    setTimeout(() => mainScreen.scrollTop = 0, 100);
                });

                btnPlayPause.addEventListener('click', (e) => {
                    e.preventDefault();
                    togglePlayPause();
                });

                btnTiro.addEventListener('click', () => {
                    dispararTiro();
                });

                showToast("🎶 Músicas prontas! Clique no disco", 2000);
                console.log('🎭 Quadrilha do Sesc 2026 — Links diretos ativos, sequência automática, botão TIRO');
            }

            window.addEventListener('beforeunload', () => {
                if (state.audioElement) {
                    state.audioElement.pause();
                    state.audioElement.src = '';
                    state.audioElement.load();
                }
            });

            initApp();
        })();
    </script>
</body>
</html>
